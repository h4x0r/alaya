    - "MCP Integration: Discovery -> Configuration -> First Memory -> Cross-Session Queries"
    - "Persona Variations: Priya (privacy audit path), Marcus (benchmark-first path)"
  tokens:
    - "API naming: snake_case functions, CamelCase types, SCREAMING_SNAKE constants"
    - "Entry point: AlayaStore::open(path)"
    - "CRUD pattern: store_*/get_*/list_*/delete_* for every entity"
    - "Builder pattern: AlayaConfig::builder().path().build()"
    - "Provider traits: ConsolidationProvider, EmbeddingProvider"
    - "Error type: AlayaError with #[non_exhaustive]"
    - "All pub methods have compilable doctests"
  api_patterns:
    - "Single Entry Point: all interaction through AlayaStore"
    - "New*/Entity Split: NewEpisode (input) vs Episode (output)"
    - "Trait Extension: ConsolidationProvider + NoOpProvider fallback"
    - "Result Everywhere: all fallible operations return Result<T, AlayaError>"
    - "Typed Reports: every lifecycle method returns a specific report type"
    - "Explicit Lifecycle: consolidate/forget/transform are explicit calls, not automatic"
    - "Two-Level Query: Query::simple() for quickstart, full struct for advanced"
    - "Reference by Borrow: all methods take &self and borrow arguments"
  type_hierarchy:
    ids: ["EpisodeId", "NodeId", "PreferenceId", "ImpressionId", "LinkId"]
    polymorphic: "NodeRef { Episode, Semantic, Preference }"
    inputs: ["NewEpisode", "NewSemanticNode", "NewImpression", "Interaction", "Query"]
