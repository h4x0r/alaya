    - "Error messages: what happened + why + what to do"
    - "Platform reach: Rust (T1) -> C FFI + MCP (T2) -> Python (T3)"
    - "Cognitive load: <20 pub methods, CRUD symmetry, sensible defaults"
    - "Time to first success: <2 minutes"
    - "Documentation: progressive disclosure from README to architecture docs"

architecture:
  pattern: "Three-store + Hebbian graph + hybrid retrieval + cognitive lifecycle"
  components:
    - "AlayaStore (public API, single entry point)"
    - "Three Stores (episodic, semantic, implicit)"
    - "Graph Overlay (Hebbian LTP/LTD, spreading activation)"
    - "Retrieval Pipeline (BM25 + vector + graph -> RRF -> RIF)"
    - "Lifecycle Processes (consolidation, perfuming, transformation, forgetting)"
    - "Provider Traits (ConsolidationProvider, EmbeddingProvider)"
    - "SQLite Storage (WAL, FTS5, embeddings)"
  tech_stack:
    - "Rust (stable), rusqlite 0.32, serde, thiserror 2.x"
    - "SQLite WAL + FTS5 + embeddings BLOBs"
    - "Tiered vector: brute-force -> sqlite-vec -> HNSW via trait"
    - "Feature flags: embed-ort, embed-fastembed, vec-sqlite, async"
  known_gaps:
    - "LTD not called from retrieval pipeline"
    - "No BEGIN IMMEDIATE for write transactions"
    - "#[non_exhaustive] missing on public enums"
    - "No input validation at API boundary"
  pipeline_stages:
    - name: "BM25"
      module: "retrieval/bm25.rs"
      input: "query text (sanitized)"
      output: "Vec<(EpisodeId, f64)> normalized [0,1]"
      skip: "empty query"
    - name: "Vector"
      module: "retrieval/vector.rs"
      input: "query embedding (f32 slice)"
      output: "Vec<(NodeRef, f64)> cosine similarity"
      skip: "query.embedding is None"
    - name: "Graph"
      module: "graph/activation.rs"
      input: "top 3 BM25 + top 3 vector seeds"
      output: "HashMap<NodeRef, f32> activation levels"
      skip: "no seed nodes"
      params: "depth=1, threshold=0.1, decay=0.6"
    - name: "RRF Fusion"
      module: "retrieval/fusion.rs"
      input: "1-3 result sets"
      output: "Vec<(NodeRef, f64)> merged ranked list"
      params: "k=60"
    - name: "Enrichment"
      module: "pipeline.rs (inline)"
      input: "fused NodeRef candidates"
      output: "full candidate tuples with content"
      gap: "non-episode nodes dropped"
    - name: "Rerank"
      module: "retrieval/rerank.rs"
      formula: "base * (1 + 0.3*ctx) * (1 + 0.2*recency)"
      output: "Vec<ScoredMemory>"
    - name: "Post-Retrieval"
      module: "store/strengths.rs + graph/links.rs"
      effects: ["RS=1.0, SS += 0.05*(1-SS)", "co-retrieval LTP: w += 0.1*(1-w)"]
  handoff_triggers:
    - from: "BM25"
      to: "RRF"
      condition: "always (even if empty)"
    - from: "Vector"
      to: "RRF"
      condition: "query.embedding.is_some() AND results non-empty"
    - from: "Graph"
      to: "RRF"
      condition: "seed_nodes non-empty AND activated nodes exist"
    - from: "RRF"
      to: "Enrichment"
      condition: "always"
    - from: "Enrichment"
      to: "Rerank"
      condition: "always"
    - from: "Rerank"
      to: "Post-Retrieval"
      condition: "always"
  degradation_chain:
    - "Full: BM25 + Vector + Graph -> 3-way RRF"
    - "No embeddings: BM25 + Graph -> 2-way RRF"
    - "No links: BM25 + Vector -> 2-way RRF"
    - "BM25 only: 1-way RRF (passthrough)"
    - "Empty DB: [] (no error)"
  delegation_rules:
    model: "Trait-based inversion of control (library calls consumer code)"
    trait: "ConsolidationProvider"
    methods:
      - name: "extract_knowledge"
        delegated_by: "consolidate()"
        input: "&[Episode] (3-10 unconsolidated episodes)"
        output: "Vec<NewSemanticNode>"
        noop: "empty vec (no semantic nodes created)"
      - name: "extract_impressions"
        delegated_by: "perfume()"
        input: "&Interaction (single conversation turn)"
        output: "Vec<NewImpression>"
        noop: "empty vec (no impressions stored)"
      - name: "detect_contradiction"
        delegated_by: "[planned: transform()]"
        input: "(&SemanticNode, &SemanticNode)"
        output: "bool"
        noop: "false (no contradiction)"
    fallback: "NoOpProvider always valid; returns empty/false for all methods"
    error_handling: "AlayaError::Provider propagates to caller; no partial writes guarantee missing"
    planned_v0_2: "EmbeddingProvider trait (embed, embed_batch, dimension, model_name)"
  context_passing:
    consolidate_to_provider:
      passed: "Batch of Episode structs (id, content, role, session_id, timestamp, context)"
      context_fields: "topics, sentiment, conversation_turn, mentioned_entities, preceding_episode"
      batch_size: 10
      minimum: 3
    perfume_to_provider:
      passed: "Single Interaction struct (text, role, session_id, timestamp, context)"
      note: "Interaction is transient (not stored); consumer constructs from their message format"
    provider_to_alaya:
      knowledge: "NewSemanticNode (content, node_type, confidence, source_episodes, embedding)"
      impressions: "NewImpression (domain, observation, valence)"
      contradiction: "bool"
    post_processing:
      knowledge: "Store node, create Causal links (weight=0.7), init Bjork strengths (SS=0.5, RS=1.0)"
      impressions: "Store impression, check domain crystallization threshold (5), crystallize or reinforce"
    validation_state: "No runtime validation of provider output in v0.1; planned for v0.1.x hardening"
  agent_prompts:
    - "Direct Rust API: store_episode after turns, query before response, dream() periodically"
    - "MCP server: universal agent integration via tool interface (v0.2)"
    - "Consumer system prompts: memory context + preferences + guidelines"
    - "Provider implementation: ConsolidationProvider, EmbeddingProvider trait guides"
    - "Anti-patterns: don't skip lifecycle, don't store system messages, don't ignore preferences"
  capability_detection:
    description: "Runtime probing for available retrieval signals (embeddings, links, FTS data)"
    mechanism: "Each retrieval signal probed independently; empty results excluded from RRF fusion"
    capability_states: ["Empty", "Episodes only (BM25)", "With embeddings (BM25+Vector)", "With graph (BM25+Graph)", "Full (BM25+Vector+Graph)"]
    provider_fallback: "NoOpProvider returns empty results for all trait methods (no error, no extraction)"
  transaction_resilience:
    wal_mode: true
    synchronous: "NORMAL"
    known_gaps: ["No BEGIN IMMEDIATE (planned v0.1)", "No WAL checkpoint management (planned v0.1)", "No explicit transaction boundaries on multi-statement operations"]
    busy_handling: "AlayaError::Db propagated to consumer; consumer implements retry"
    threading: "Send but not Sync; consumer wraps in Arc<Mutex<AlayaStore>>"
  degradation_chain:
    levels:
      - "Level 1: Full (BM25 + Vector + Graph -> RRF -> Rerank)"
      - "Level 2: No embeddings (BM25 + Graph -> RRF -> Rerank)"
      - "Level 3: No links (BM25 + Vector -> RRF -> Rerank)"
      - "Level 4: No FTS matches (Vector + Graph -> RRF -> Rerank)"
      - "Level 5: BM25 only (BM25 -> Rerank)"
      - "Level 6: Empty (Ok(vec![]))"
    enabler: "RRF accepts variable-length result set lists; self-healing via co-retrieval link formation"
  operation_idempotency:
    consolidate: "convergent (re-run picks up remaining work)"
    forget: "partial (decay is multiplicative, not idempotent; archival is idempotent)"
    transform: "mostly (pruning idempotent, decay not)"
    perfume: "not idempotent (accumulates duplicate impressions)"
    purge: "fully idempotent"
  resource_budgets:
    embedding_scan: "Full brute-force O(N*D), ceiling ~50K; sqlite-vec planned v0.2"
    graph_traversal: "max_depth + threshold + decay_per_hop + activation_cap(2.0)"
    query_results: "max_results * 3 at each pipeline stage, default max_results=5"
    consolidation_batch: "10 episodes per call"

