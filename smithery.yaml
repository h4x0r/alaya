startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      dbPath:
        type: string
        description: "Path to SQLite database file (default: ~/.alaya/memory.db)"
      llmApiKey:
        type: string
        description: "API key for LLM auto-consolidation (optional). Any OpenAI-compatible provider."
      llmApiUrl:
        type: string
        description: "LLM API endpoint (default: https://api.openai.com/v1/chat/completions)"
      llmModel:
        type: string
        description: "LLM model name (default: gpt-4o-mini)"
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'alaya-mcp'],
      env: {
        ...(config.dbPath ? { ALAYA_DB: config.dbPath } : {}),
        ...(config.llmApiKey ? { ALAYA_LLM_API_KEY: config.llmApiKey } : {}),
        ...(config.llmApiUrl ? { ALAYA_LLM_API_URL: config.llmApiUrl } : {}),
        ...(config.llmModel ? { ALAYA_LLM_MODEL: config.llmModel } : {})
      }
    })
