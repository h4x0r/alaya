    - "IDs: newtype around i64"
    - "Text content: String (never &str in public API)"
    - "Optional fields: Option<T> (never sentinel values)"
    - "Collections: Vec<T> (never iterators in returns)"
    - "Retrieval scores: f64, weights/strengths: f32"
  accessibility:
