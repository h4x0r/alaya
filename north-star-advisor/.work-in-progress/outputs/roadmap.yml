pivot_triggers:
  - trigger: "OpenClaw announces component selection within 4 weeks"
    response: "Evaluate accelerating Phase 1-2; consider v0.1.0-alpha"
  - trigger: "Competitor ships zero-dep cognitive memory library"
    response: "Emergency publish: close P0 in 1 week, minimal docs"
  - trigger: "LoCoMo baseline below 40% P@5"
    response: "Reframe blog as analysis; focus on lifecycle differentiators"
  - trigger: "Zero MACC 90 days post-publication"
    response: "5 developer interviews; likely DX issue"
  - trigger: "MACC exceeds 5 within 4 weeks"
    response: "Accelerate v0.2 planning; publish roadmap RFC"
  - trigger: "Solo-dev capacity constraint (Phase 2 incomplete after 6 weeks)"
    response: "Drop Phase 4; minimum viable is Phases 1-3"

