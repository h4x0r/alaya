sequence:
  - phase: 1
    name: "P0 Hardening"
    weeks: "1-2"
    tasks:
      - "Add #[non_exhaustive] to all public enums (GAP-001)"
      - "Implement BEGIN IMMEDIATE for write transactions (GAP-002)"
      - "Add input validation at API boundary (GAP-003)"
      - "Change internal modules to pub(crate) (GAP-004)"
      - "Add compilable doctests on all pub methods (GAP-005)"

  - phase: 2
    name: "P1 Quality + Documentation"
    weeks: "3-5"
    tasks:
      - "Wire LTD in transform() (GAP-006)"
      - "Semantic/preference node enrichment in pipeline (GAP-007)"
      - "Tombstone mechanism for deleted nodes (GAP-008)"
      - "RIF suppression in retrieval pipeline (GAP-009)"
      - "README with quickstart (new)"
      - "Examples directory: basic_agent, lifecycle_demo, custom_provider (new)"
      - "Cargo.toml metadata (GAP-013 partial)"

  - phase: 3
    name: "CI + Publication"
    weeks: "6"
    tasks:
      - "CI pipeline: test, clippy, fmt, audit, msrv, no-network (GAP-012)"
      - "cargo publish --dry-run validation"
      - "cargo publish v0.1.0"
      - "Launch: r/rust, HackerNews, blog, OpenClaw outreach"

  - phase: 4
    name: "Benchmark Fast-Follow"
    weeks: "7-9"
    tasks:
      - "LoCoMo benchmark harness implementation"
      - "Run baselines (BM25-only and hybrid)"
      - "LongMemEval baseline (if time permits)"
      - "Benchmark blog post with honest results"
      - "OpenClaw follow-up with benchmark data"

  - phase: 5
    name: "v0.1.x Iteration"
    weeks: "10+"
    tasks:
      - "Respond to user feedback"
      - "P2 polish (WAL checkpoint, content-hash, MSRV pinning)"
      - "Begin v0.2 planning based on MACC data"

focus_areas:
  - "Close P0 hardening gaps without scope creep"
  - "Write documentation for Priya persona first (privacy-first, quickstart)"
  - "Make launch communications specific and technical, not promotional"
  - "Run LoCoMo within 3 weeks of publication regardless of results"
  - "Engage OpenClaw with a working published crate, not a pitch"

avoid_list:
  - "Do not optimize retrieval quality before publication"
  - "Do not build MCP server before v0.1.0"
  - "Do not add feature flags before v0.1.0"
  - "Do not chase GitHub stars or social media engagement"
  - "Do not implement Python bindings, C FFI, or cross-language interfaces before v0.2"
  - "Do not add website, logo, or branding assets before library has users"
  - "Do not skip CI pipeline"
  - "Do not attempt to make the first version perfect"

review_triggers:
  - trigger: "OpenClaw announces component selection timeline within 4 weeks"
    response: "Evaluate accelerating Phase 1-2; consider v0.1.0-alpha pre-release"
  - trigger: "Competitor ships zero-dep embedded memory library with cognitive lifecycle"
    response: "Emergency publication: close P0 in 1 week, publish with minimal docs"
  - trigger: "LoCoMo baseline below 40% P@5 (BM25-only)"
    response: "Reframe benchmark post as analysis; focus on lifecycle differentiators"
  - trigger: "Zero MACC 90 days post-publication"
    response: "5 developer interviews; likely positioning or DX issue, not architecture"
  - trigger: "MACC exceeds 5 within 4 weeks of publication"
    response: "Accelerate v0.2 planning; publish roadmap RFC"
  - trigger: "Solo-developer capacity constraint (Phase 2 incomplete after 6 calendar weeks)"
    response: "Drop Phase 4; minimum viable is Phases 1-3"
  - trigger: "Research invalidates core mechanism (Bjork, CLS, Hebbian)"
    response: "Update affected mechanism; modular architecture supports replacement"

success_criteria:
  90_day:
    - "v0.1.0 published on crates.io"
    - "MACC >= 3"
    - "LoCoMo baseline measured and published"
    - "At least one external API review received"
    - "OpenClaw outreach completed with published crate"
    - "Zero SEV-1 or SEV-2 incidents"

failure_criteria:
  90_day:
    - "v0.1.0 not published (execution failure)"
    - "Zero external engagement (positioning failure)"
    - "Competitor occupies quadrant first (timing failure)"

scheduled_reviews:
  - name: "Phase 1 completion"
    timing: "End of Week 2"
    focus: "P0 gaps closed? Any blockers?"
  - name: "Pre-publication gate"
    timing: "End of Week 6"
    focus: "CI green? Docs adequate? Ship decision."
  - name: "Post-launch check"
    timing: "2 weeks post-publish"
    focus: "Any MACC? Feedback quality? Adjustments?"
  - name: "Benchmark review"
    timing: "3 weeks post-publish"
    focus: "LoCoMo numbers available. Strategy adjustment needed?"
  - name: "90-day review"
    timing: "90 days post-publish"
    focus: "MACC vs target. Full strategy reassessment."
  - name: "v0.2 scope decision"
    timing: "When MACC >= 5"
    focus: "User-driven feature prioritization."

axiom_satisfaction:
  "Privacy > Features": "No features added that compromise privacy; path is hardening and documentation"
  "Process > Storage": "Lifecycle is value proposition; users experience it from day one without benchmarks"
  "Correctness > Speed": "P0 hardening before publication; BEGIN IMMEDIATE, validation, non_exhaustive"
  "Simplicity > Completeness": "Ship with complete lifecycle and zero deps; no MCP, Python, feature flags"
  "Honesty > Marketing": "Benchmarks published as fast-follow with honest numbers, not delayed for impressive ones"

