# Structured extract from PIPELINE_ORCHESTRATION.md
# Generated: 2026-02-26
# Phase: 10

reframing: "PIPELINE_ORCHESTRATION -> Retrieval Pipeline Orchestration (Alaya is a library, not a multi-agent system)"

entry_point: "retrieval::pipeline::execute_query(conn, query)"
public_api: "AlayaStore::query(&self, &Query) -> Result<Vec<ScoredMemory>>"
execution_model: "synchronous, single-threaded, in-process"

query_types:
  input:
    - name: "Query"
      fields: ["text: String", "embedding: Option<Vec<f32>>", "context: QueryContext", "max_results: usize"]
      convenience: "Query::simple(text) -> defaults: no embedding, empty context, max_results=5"
    - name: "QueryContext"
      fields: ["topics: Vec<String>", "sentiment: f32", "mentioned_entities: Vec<String>", "current_timestamp: Option<i64>"]
  output:
    - name: "ScoredMemory"
      fields: ["node: NodeRef", "content: String", "score: f64", "role: Option<Role>", "timestamp: i64"]
  identity:
    - name: "NodeRef"
      variants: ["Episode(EpisodeId)", "Semantic(NodeId)", "Preference(PreferenceId)"]
      traits: ["Copy", "Hash", "Eq"]

pipeline_stages:
  - name: "BM25"
    module: "retrieval/bm25.rs"
    function: "search_bm25(conn, query, limit)"
    input: "query text (sanitized)"
    output: "Vec<(EpisodeId, f64)>"
    score_range: "[0.0, 1.0] (min-max normalized FTS5 rank)"
    sql: "SELECT e.id, rank FROM episodes_fts MATCH ?1 JOIN episodes ORDER BY rank LIMIT ?2"
    sanitization: "strip non-alphanumeric non-whitespace chars"
    skip_condition: "empty or sanitized-to-empty query text"

  - name: "Vector"
    module: "retrieval/vector.rs + store/embeddings.rs"
    function: "search_vector(conn, embedding, limit)"
    input: "query embedding (f32 slice)"
    output: "Vec<(NodeRef, f64)>"
    score_range: "[0.0, 1.0] (cosine similarity)"
    algorithm: "brute-force cosine over all stored embeddings"
    skip_condition: "query.embedding is None"
    planned_upgrade: "sqlite-vec SIMD (feature flag vec-sqlite, v0.2)"

  - name: "Graph"
    module: "graph/activation.rs"
    function: "spread_activation(conn, seeds, max_depth, threshold, decay_per_hop)"
    input: "top 3 BM25 + top 3 vector seed nodes"
    output: "HashMap<NodeRef, f32> (converted to Vec<(NodeRef, f64)>)"
    algorithm: "Collins & Loftus (1975) spreading activation"
    parameters:
      max_depth: 1
      threshold: 0.1
      decay_per_hop: 0.6
    skip_condition: "no seed nodes (both BM25 and vector returned empty)"
    post_processing: "seed nodes excluded from results"

  - name: "RRF Fusion"
    module: "retrieval/fusion.rs"
    function: "rrf_merge(result_sets, k)"
    input: "1-3 result sets from BM25/vector/graph"
    output: "Vec<(NodeRef, f64)> (single merged ranked list)"
    algorithm: "Reciprocal Rank Fusion (Cormack, Clarke & Buettcher, 2009)"
    k: 60
    behavior: "rank-based only; original scores discarded; overlap rewarded"

  - name: "Enrichment"
    module: "pipeline.rs (inline) + store/episodic.rs"
    input: "fused NodeRef candidates"
    output: "Vec<(NodeRef, f64, String, Option<Role>, i64, EpisodeContext)>"
    queries: "one get_episode per candidate (up to fetch_limit)"
    known_gap: "non-episode NodeRef variants silently dropped"

  - name: "Rerank"
    module: "retrieval/rerank.rs"
    function: "rerank(candidates, query_context, now, max_results)"
    formula: "base * (1 + 0.3 * context_sim) * (1 + 0.2 * recency)"
    recency_formula: "exp(-age_days / 30.0)"
    context_formula: "topic_jaccard * 0.5 + entity_jaccard * 0.25 + sentiment_proximity * 0.25"
    max_boost: "56% (1.3 * 1.2 = 1.56x base score)"

  - name: "Post-Retrieval"
    module: "store/strengths.rs + graph/links.rs"
    effects:
      - name: "Bjork on_access"
        function: "strengths::on_access(conn, node)"
        formula: "RS = 1.0, SS += 0.05 * (1 - SS)"
        fires: "once per returned result"
      - name: "Hebbian co-retrieval"
        function: "links::on_co_retrieval(conn, a, b)"
        formula: "w += 0.1 * (1 - w); new links start at 0.3"
        fires: "once per pair of returned results (O(K^2))"
    error_handling: "silently discarded (let _ = ...)"

stage_transitions:
  - from: "BM25"
    to: "RRF"
    data: "Vec<(NodeRef::Episode, f64)>"
    always: true

  - from: "Vector"
    to: "RRF"
    data: "Vec<(NodeRef, f64)>"
    condition: "query.embedding.is_some() AND results non-empty"

  - from: "Graph"
    to: "RRF"
    data: "Vec<(NodeRef, f64)>"
    condition: "seed_nodes non-empty AND activated nodes exist"

  - from: "RRF"
    to: "Enrichment"
    data: "Vec<(NodeRef, f64)>"
    always: true

  - from: "Enrichment"
    to: "Rerank"
    data: "Vec<(NodeRef, f64, String, Option<Role>, i64, EpisodeContext)>"
    always: true

  - from: "Rerank"
    to: "Post-Retrieval"
    data: "Vec<ScoredMemory>"
    always: true

graceful_degradation_chain:
  - level: 0
    name: "Full Pipeline"
    stages: "BM25 + Vector + Graph -> 3-way RRF -> Rerank"
    requirements: "FTS5 matches + embedding provided + links exist"
  - level: 1
    name: "No Embeddings"
    stages: "BM25 + Graph -> 2-way RRF -> Rerank"
    trigger: "query.embedding is None"
  - level: 2
    name: "No Graph Links"
    stages: "BM25 + Vector -> 2-way RRF -> Rerank"
    trigger: "no links in database or no seed nodes"
  - level: 3
    name: "BM25 Only"
    stages: "BM25 -> 1-way RRF -> Rerank"
    trigger: "no embedding AND no links"
  - level: 4
    name: "No FTS5 Matches"
    stages: "Vector + Graph -> 2-way RRF -> Rerank"
    trigger: "query terms not in episodes_fts"
  - level: 5
    name: "Empty Database"
    stages: "[] (empty result, no error)"
    trigger: "no episodes stored"

hardcoded_parameters:
  fetch_multiplier: 3
  rrf_k: 60
  bm25_over_fetch: 3
  graph_max_depth: 1
  graph_threshold: 0.1
  graph_decay_per_hop: 0.6
  seed_count_bm25: 3
  seed_count_vector: 3
  context_weight_topics: 0.5
  context_weight_entities: 0.25
  context_weight_sentiment: 0.25
  context_boost_factor: 0.3
  recency_boost_factor: 0.2
  recency_half_life_days: 30
  ss_increment_rate: 0.05
  co_retrieval_ltp_rate: 0.1
  new_co_retrieval_weight: 0.3
  activation_cap: 2.0
  cosine_similarity_floor: 0.0

error_handling:
  propagation: "Rust ? operator for read-path stages; let _ = for write-path side effects"
  malformed_input:
    empty_query: "Ok(vec![])"
    all_punctuation: "Ok(vec![])"
    dimension_mismatch: "cosine returns 0.0"
    missing_episode: "silently dropped in enrichment"
  side_effect_failure: "silently discarded, pipeline returns successfully"

performance:
  target_workload: "< 10K episodes, personal agent"
  expected_total_latency: "< 5ms"
  bottlenecks:
    - "vector brute-force at > 10K embeddings"
    - "O(K^2) co-retrieval writes"
    - "per-candidate enrichment queries"

known_gaps:
  - id: "semantic-enrichment"
    description: "Non-episode NodeRef variants dropped during enrichment"
    severity: "medium"
    location: "pipeline.rs:69-71"
  - id: "no-ltd-in-pipeline"
    description: "LTD not called from retrieval (decay_links exists but unused in query path)"
    severity: "low"
    location: "pipeline.rs"
  - id: "no-post-retrieval-transaction"
    description: "Post-retrieval writes not wrapped in transaction"
    severity: "low"
    location: "pipeline.rs:80-90"
  - id: "hardcoded-params"
    description: "All retrieval parameters hardcoded, not configurable"
    severity: "medium"
    location: "multiple files"
  - id: "no-session-scoping"
    description: "Cannot restrict query to a session"
    severity: "low"
    location: "types.rs:Query"

planned_v0_2:
  - "RetrievalConfig struct for tuning knobs"
  - "Semantic and preference node enrichment"
  - "sqlite-vec SIMD vector search (feature flag vec-sqlite)"
  - "Batch post-retrieval writes in transaction"
  - "Query scoping (session_id, time_range, node_type)"
  - "Async API (feature flag async)"

references:
  - "Cormack, Clarke & Buettcher (2009) - Reciprocal Rank Fusion"
  - "Collins & Loftus (1975) - Spreading Activation"
  - "Bjork & Bjork (1992) - Dual-Strength Theory of Disuse"
  - "Hebb (1949) - Hebbian Learning"
  - "Robertson et al. (2009) - BM25 / Probabilistic Relevance Framework"
