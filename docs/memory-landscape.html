// ── Build similarity links ──
const linkFeats = ALL_FEAT_KEYS;
const links = [];
for (let i = 0; i < SYSTEMS.length; i++) {
  for (let j = i + 1; j < SYSTEMS.length; j++) {
    const a = SYSTEMS[i], b = SYSTEMS[j];
    const shared = linkFeats.filter(f => a[f] && b[f]).length;
    const sameCat = a.cat === b.cat;
    if ((sameCat && shared >= 6) || (!sameCat && shared >= 8)) {
      links.push({source: a.id, target: b.id, strength: shared / linkFeats.length});
    }
  }
}

// ── SVG + zoom ──
const graphDiv = document.getElementById("graph");
const tooltip = document.getElementById("tooltip");
const width = graphDiv.clientWidth;
const height = graphDiv.clientHeight;
const svg = d3.select("#graph").append("svg").attr("width", width).attr("height", height);
const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform)));

// ── Node sizing by stars (log scale) ──
const radiusScale = d3.scaleSqrt().domain([0, 100000]).range([6, 35]);
function nodeRadius(d) { return Math.max(6, radiusScale(d.stars || 50)); }

// ── Force simulation ──
const simulation = d3.forceSimulation(SYSTEMS)
  .force("link", d3.forceLink(links).id(d => d.id).distance(120).strength(d => d.strength * 0.3))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("x", d3.forceX().x(d => {
    const cats = Object.keys(CATEGORIES);
    const idx = cats.indexOf(d.cat);
    return width * (0.2 + 0.6 * idx / (cats.length - 1));
  }).strength(0.07))
  .force("y", d3.forceY(height / 2).strength(0.05))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 4));

// ── Draw links ──
const linkElements = g.append("g").selectAll("line").data(links).enter().append("line")
  .attr("class", "link")
  .attr("stroke", "#30363d")
  .attr("stroke-width", d => d.strength * 4);

// ── Draw nodes ──
const nodeElements = g.append("g").selectAll("g").data(SYSTEMS).enter().append("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  );

nodeElements.append("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => CATEGORIES[d.cat])
  .attr("stroke", d => d.id === "Alaya" ? "#f0f6fc" : d3.color(CATEGORIES[d.cat]).darker(0.5))
  .attr("stroke-width", d => d.id === "Alaya" ? 3 : 1.5)
  .attr("opacity", 0.85);

nodeElements.append("text")
  .attr("dy", d => nodeRadius(d) + 12)
  .attr("text-anchor", "middle")
  .attr("font-size", d => d.id === "Alaya" ? "12px" : "10px")
  .attr("font-weight", d => d.id === "Alaya" ? "bold" : "normal")
  .text(d => d.id);

// ── Tooltip with details from related-work ──
nodeElements.on("mouseover", (e, d) => {
  let html = `<h3>${d.id}</h3><div>${d.desc}</div>`;
  if (d.details) html += `<div class="details">${d.details}</div>`;
  html += `<div class="detail-row">`;
  if (d.storage) html += `<div class="detail-badge"><span class="bl">Storage:</span> <span class="bv">${d.storage}</span></div>`;
  if (d.rag) html += `<div class="detail-badge"><span class="bl">RAG:</span> <span class="bv">${d.rag}</span></div>`;
  html += `</div>`;
  html += `<div class="feat-section">`;
  FEATURE_GROUPS.forEach(group => {
    const tags = Object.entries(group.feats).map(([k, label]) =>
      `<span class="tag ${d[k] ? 'yes' : 'no'}">${label}</span>`
    ).join("");
    html += `<div class="feat-label">${group.label}</div>${tags}`;
  });
  html += `</div><div class="meta">${d.lang} \u00b7 ${d.cat} \u00b7 ${d.stars > 0 ? d.stars.toLocaleString() + " \u2605" : "new"}</div>`;
  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
}).on("mousemove", (e) => {
  const rect = graphDiv.getBoundingClientRect();
  let left = e.clientX - rect.left + 15;
  let top = e.clientY - rect.top - 10;
  if (left + 410 > rect.width) left = e.clientX - rect.left - 415;
  if (top + 400 > rect.height) top = rect.height - 400;
  tooltip.style.left = left + "px";
  tooltip.style.top = Math.max(0, top) + "px";
}).on("mouseout", () => { tooltip.style.opacity = 0; });

// ── Tick ──
simulation.on("tick", () => {
  linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
});

ragGroup.className = "filter-group";
["Naive","Advanced","Modular"].forEach(rag => {

// Language filters
const majorLangs = ["Python","Rust","TypeScript","Go"];
const langDetails = document.createElement("details");
langDetails.innerHTML = `<summary>Language <span class="group-count">${majorLangs.length + 1}</span></summary>`;
const langGroup = document.createElement("div");
langGroup.className = "filter-group";
majorLangs.forEach(lang => {
  const count = SYSTEMS.filter(s => s.lang.includes(lang)).length;
  if (count > 0) {
    const el = document.createElement("label");
    el.innerHTML = `<input type="checkbox" data-lang="${lang}"> ${lang} <span class="feat-count">${count}</span>`;
    langGroup.appendChild(el);
  }

const otherCount = SYSTEMS.filter(s => !majorLangs.some(l => s.lang.includes(l))).length;
if (otherCount > 0) {
  const el = document.createElement("label");
  el.innerHTML = `<input type="checkbox" data-lang="Other"> Other <span class="feat-count">${otherCount}</span>`;
  langGroup.appendChild(el);

langDetails.appendChild(langGroup);
filtersDiv.appendChild(langDetails);

// Legend
const legendDiv = document.getElementById("legend");
Object.entries(CATEGORIES).forEach(([cat, color]) => {
  legendDiv.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${cat}</div>`;
});

// ── Filter logic ──
const totalCountEl = document.getElementById("total-count");
const visibleCountEl = document.getElementById("visible-count");
totalCountEl.textContent = SYSTEMS.length;

function applyFilters() {
  const activeCats = new Set([...document.querySelectorAll('#cat-filters input:checked')].map(el => el.dataset.cat));
  const activeFeats = [...document.querySelectorAll('[data-feat]:checked')].map(el => el.dataset.feat);
  const activeLangs = [...document.querySelectorAll('[data-lang]:checked')].map(el => el.dataset.lang);
  const activeRags = [...document.querySelectorAll('[data-rag]:checked')].map(el => el.dataset.rag);
  const searchTerm = document.getElementById("search").value.toLowerCase();

  let visibleCount = 0;
  nodeElements.each(function(d) {
    const catMatch = activeCats.has(d.cat);
    const featMatch = activeFeats.length === 0 || activeFeats.every(f => d[f]);
    const searchMatch = !searchTerm || d.id.toLowerCase().includes(searchTerm) || d.desc.toLowerCase().includes(searchTerm) || d.lang.toLowerCase().includes(searchTerm) || (d.storage && d.storage.toLowerCase().includes(searchTerm));
    let langMatch = true;
    if (activeLangs.length > 0) {
      langMatch = activeLangs.some(lang => {
        if (lang === "Other") return !majorLangs.some(l => d.lang.includes(l));
        return d.lang.includes(lang);
      });
    }
    let ragMatch = true;
    if (activeRags.length > 0) {
      ragMatch = d.rag && activeRags.some(r => d.rag.startsWith(r));
    }
    const visible = catMatch && featMatch && searchMatch && langMatch && ragMatch;
    d3.select(this).style("opacity", visible ? 1 : 0.08);
    d._visible = visible;
    if (visible) visibleCount++;
  });
  linkElements.style("opacity", d => (d.source._visible && d.target._visible) ? 0.15 : 0.02);
  visibleCountEl.textContent = visibleCount;
}

// Wire up all filter inputs
document.querySelectorAll('#filter-sections input[type="checkbox"]').forEach(el => el.addEventListener("change", applyFilters));
document.getElementById("search").addEventListener("input", applyFilters);

// Reset button
document.getElementById("reset-btn").addEventListener("click", () => {
  document.querySelectorAll('#filter-sections input[type="checkbox"]').forEach(el => {
    el.checked = el.dataset.cat ? true : false;
  });
  document.getElementById("search").value = "";
  applyFilters();
});

// Initial count
applyFilters();

  const mTotalEl = document.getElementById('m-total');

  // Sync mobile footer counts via MutationObserver on desktop counter
  mTotalEl.textContent = SYSTEMS.length;
  mVisibleEl.textContent = visibleCountEl.textContent;
  new MutationObserver(() => {
    mVisibleEl.textContent = visibleCountEl.textContent;
  }).observe(visibleCountEl, { childList: true, characterData: true, subtree: true });

  // ── Sidebar drawer toggle ──
  function openDrawer() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
  }
  function closeDrawer() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  }
  document.getElementById('menu-btn').addEventListener('click', openDrawer);
  document.getElementById('sidebar-close').addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);
  // Close drawer when a filter changes (on mobile)
  document.querySelectorAll('#filter-sections input[type="checkbox"]').forEach(el => {
    el.addEventListener('change', () => {
      // Small delay so user sees the check state change
      if (isMobile()) setTimeout(closeDrawer, 200);
    });
  });

  // ── Mobile search toggle ──
  const searchBar = document.getElementById('mobile-search-bar');
  const mobileSearchInput = document.getElementById('mobile-search-input');
  document.getElementById('search-toggle').addEventListener('click', () => {
    const isOpen = searchBar.style.display === 'block';
    searchBar.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) mobileSearchInput.focus();
  });
  // Sync mobile search → desktop search
  mobileSearchInput.addEventListener('input', (e) => {
    document.getElementById('search').value = e.target.value;
    applyFilters();
  });
  // Sync desktop search → mobile search (if opened programmatically)
  document.getElementById('search').addEventListener('input', () => {
    mobileSearchInput.value = document.getElementById('search').value;
  });

  // ── Bottom sheet tooltip (tap-based) ──
  function showSheet(d) {
    let html = `<h3>${d.id}</h3>`;
    html += `<div class="sheet-desc">${d.desc}</div>`;
    if (d.details) html += `<div class="sheet-details">${d.details}</div>`;
    html += `<div class="sheet-badges">`;
    if (d.storage) html += `<span class="sheet-badge"><span class="bl">Storage:</span> ${d.storage}</span>`;
    if (d.rag) html += `<span class="sheet-badge"><span class="bl">RAG:</span> ${d.rag}</span>`;
    html += `</div>`;
    FEATURE_GROUPS.forEach(group => {
      html += `<div class="sheet-feat-label">${group.label}</div><div class="sheet-tags">`;
      Object.entries(group.feats).forEach(([k, label]) => {
        html += `<span class="tag ${d[k] ? 'yes' : 'no'}">${label}</span>`;
      });
      html += `</div>`;
    });
    html += `<div class="sheet-meta">${d.lang} &middot; ${d.cat} &middot; ${d.stars > 0 ? d.stars.toLocaleString() + ' &#9733;' : 'new'}</div>`;
    sheetContent.innerHTML = html;
    mobileTooltip.classList.add('visible');
  }
  function closeSheet() { mobileTooltip.classList.remove('visible'); }

  // Tap on node → show bottom sheet (mobile only)
  nodeElements.on('click.mobile', (e, d) => {
    if (!isMobile()) return;
    e.stopPropagation();
    showSheet(d);
  });

  // Close bottom sheet
  mobileTooltip.querySelector('.sheet-close').addEventListener('click', closeSheet);

  // Swipe-down to close bottom sheet
  let touchStartY = 0;
  mobileTooltip.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  mobileTooltip.addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 60 && mobileTooltip.scrollTop <= 0) {
      closeSheet();
    }
  }, { passive: true });

  // Tap on empty graph area → close sheet
  svg.on('click.closemobile', () => {
    if (isMobile()) closeSheet();
  });

  // ── Mobile reset ──
  document.getElementById('m-reset-btn').addEventListener('click', () => {
    document.querySelectorAll('#filter-sections input[type="checkbox"]').forEach(el => {
      el.checked = !!el.dataset.cat;
    });
    document.getElementById('search').value = '';
    mobileSearchInput.value = '';
    searchBar.style.display = 'none';
    applyFilters();
  });

  // ── Resize handler — re-center simulation on orientation change ──
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      const w = graphDiv.clientWidth;
      const h = graphDiv.clientHeight;
      svg.attr('width', w).attr('height', h);
      simulation.force('center', d3.forceCenter(w / 2, h / 2));
      simulation.force('x').x(d => {
        const cats = Object.keys(CATEGORIES);
        const idx = cats.indexOf(d.cat);
        return w * (0.2 + 0.6 * idx / (cats.length - 1));
      });
      simulation.force('y', d3.forceY(h / 2).strength(0.05));
      simulation.alpha(0.3).restart();
    }, 150);
  });
})();
</script>
</body>
</html>
