integration_tests:
  - name: "store_lifecycle"
    purpose: "Full CRUD + lifecycle flows"
    tests: ["full_agent_lifecycle", "preference_emergence_lifecycle", "hybrid_retrieval_with_embeddings"]
  - name: "retrieval_quality"
    purpose: "Query relevance assertions"
    tests: ["locomo_baseline", "precision_at_k", "ndcg_at_k"]
  - name: "degradation_chain"
    purpose: "Graceful degradation scenarios"
    tests: ["empty_db", "bm25_only", "vector_only", "bm25_and_vector", "full_pipeline"]
  - name: "concurrent_access"
    purpose: "Multi-threaded Arc<Mutex> patterns"
    tests: ["arc_mutex_concurrent_writes", "concurrent_reads"]
  - name: "persistence"
    purpose: "File-backed database roundtrip"
    tests: ["persistence_roundtrip", "reopen_after_lifecycle"]
  - name: "error_paths"
    purpose: "Every AlayaError variant exercised"
    tests: ["all_error_variants_display", "provider_error_propagation"]
  - name: "purge_compliance"
    purpose: "GDPR purge completeness"
    tests: ["purge_all_resets", "purge_session", "purge_older_than"]

property_tests:
  bjork_dual_strength:
    - "storage_strength_monotonic: SS_new >= SS for all SS in [0, 1]"
    - "retrieval_strength_decay_monotonic: RS * 0.95 <= RS"
    - "storage_strength_convergence: approaches 1.0 after many accesses"
    - "retrieval_strength_approaches_zero: approaches 0.0 after many cycles"
    - "archival_safety: nodes above thresholds are never archivable"
  hebbian_weights:
    - "ltp_bounded: w + 0.1 * (1 - w) in [0, 1]"
    - "ltp_monotonic: LTP preserves weight ordering"
    - "ltp_convergence: approaches 1.0 after many co-retrievals"
    - "decay_non_negative: w * factor >= 0"
  rrf_fusion:
    - "scores_positive: all RRF scores > 0 for non-empty inputs"
    - "more_sets_higher_score: presence in more sets >= presence in fewer"
  cosine_similarity:
    - "range: cos(a, b) in [-1, 1]"
    - "symmetric: cos(a, b) == cos(b, a)"
    - "self_identity: cos(a, a) == 1.0 for non-zero a"
    - "embedding_roundtrip: serialize/deserialize preserves all f32 bits"
  recency_decay:
    - "monotonic: older timestamps produce lower decay"
    - "range: always in [0, 1]"

golden_datasets:
  - name: "LoCoMo"
    source: "arXiv:2402.14088"
    tests: "Multi-session recall, temporal reasoning, preference tracking"
    metrics: ["precision_at_5", "recall_at_10", "ndcg_at_5", "mrr"]
    targets:
      bm25_only_p5: 0.70
      hybrid_p5: 0.80
      recall_at_10: 0.60
      ndcg_at_5: 0.65
  - name: "LongMemEval"
    source: "arXiv:2410.10813"
    tests: "Factual recall, preference consistency, temporal ordering"
    metrics: ["precision_at_5", "ndcg_at_5"]
  - name: "Alaya-Internal"
    source: "hand-curated"
    tests: "Bjork forgetting impact, vasana crystallization accuracy, Hebbian graph traversal delta"
    metrics: ["forgetting_recall_curve", "preference_precision", "hybrid_delta"]

lifecycle_invariants:
  consolidation:
    - "I1: safe on any database state (including empty)"
    - "I2: NoOpProvider never creates semantic nodes"
    - "I3: created nodes are linked to source episodes"
    - "I4: does not delete or modify episodes"
  forgetting:
    - "I5: never increases retrieval strength"
    - "I6: never modifies storage strength"
    - "I7: archived nodes are fully removed (no orphans)"
    - "I8: safe to call repeatedly (idempotent decay)"
    - "I9: recently accessed nodes survive"
  transformation:
    - "I10: idempotent on clean data"
    - "I11: dedup preserves stronger node"
    - "I12: prune only removes below threshold"
    - "I13: never deletes episodes"
  perfuming:
    - "I14: crystallization requires >= 5 impressions"
    - "I15: NoOpProvider stores zero impressions"
    - "I16: no duplicate preferences within domain"
    - "I17: reinforcement monotonically increases evidence_count"
  cross_lifecycle:
    - "I18: full lifecycle sequence does not corrupt database"
    - "I19: purge(All) resets to empty state"

fuzz_targets:
  - name: "fts5_sanitization"
    input: "arbitrary strings"
    tests: "FTS5 MATCH injection resistance"
    priority: "critical (ADR-010, security)"
  - name: "embedding_deserialize"
    input: "arbitrary bytes"
    tests: "BLOB deserialization safety"
    priority: "high"
  - name: "context_json"
    input: "arbitrary strings"
    tests: "EpisodeContext JSON deserialization"
    priority: "medium"
  - name: "store_episode"
    input: "arbitrary strings as content"
    tests: "Episode storage with adversarial content"
    priority: "high"
  - name: "cosine_similarity"
    input: "arbitrary f32 vec pairs"
    tests: "Cosine similarity with edge-case floats"
    priority: "medium"

performance_benchmarks:
  targets:
    store_episode_no_emb: "< 100 us"
    store_episode_384_emb: "< 200 us"
    bm25_query_1k: "< 1 ms"
    bm25_query_10k: "< 5 ms"
    vector_query_1k_384: "< 5 ms"
    vector_query_10k_384: "< 50 ms"
    hybrid_query_1k: "< 10 ms"
    cosine_384: "< 1 us"
    forget_sweep_1k: "< 5 ms"
    transform_1k_5k: "< 50 ms"
  regression_threshold: "20% warning, 50% failure"
  framework: "divan 0.1"

ci_pipeline:
  platforms: ["ubuntu-22.04", "macos-14", "windows-2022"]
  rust_versions: ["1.75.0 (MSRV)", "stable", "beta"]
  checks:
    - "cargo build --all-targets"
    - "cargo test --all-targets"
    - "cargo test --doc"
    - "cargo clippy -- -D warnings"
    - "cargo fmt --check"
    - "cargo tree (no networking deps)"
    - "quickstart regression"
  scheduled:
    - "nightly fuzz runs (10 min per target)"
    - "weekly extended proptest (10K cases)"

dev_dependencies_to_add:
  - "proptest = '1.4'"
  - "tempfile = '3.10'"
  - "divan = '0.1'"

cross_references:
  architecture_blueprint: "Phase 6 - components, retrieval pipeline, graceful degradation"
  adr: "Phase 9 - ADR-001 through ADR-010 informing test invariants"
  accessibility: "Phase 5c - doctest coverage, quickstart regression, error path testing"
  security: "Phase 8 - FTS5 injection, provider injection, fuzz target priorities"
  brand: "Phase 1 - Honesty > Marketing axiom driving benchmark publication"
