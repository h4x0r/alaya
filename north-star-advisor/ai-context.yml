security:
  auth_pattern: "architectural (no auth in library; consumer responsibility)"
  threats:
    - "Memory poisoning (OWASP ASI06)"
    - "FTS5 MATCH injection"
    - "Memory resurrection after deletion"
    - "Cross-user data leakage"
    - "PII persistence in memories/embeddings"
    - "Embedding poisoning"
    - "WAL corruption/unbounded growth"
    - "Transaction deadlock (BEGIN DEFERRED)"
    - "Provider output injection"
    - "File theft (unencrypted SQLite)"
  guardrails:
    - "Zero network calls in core"
    - "FTS5 input sanitization"
    - "BEGIN IMMEDIATE for writes"
    - "Tombstone mechanism for deletions"
    - "Content validation hooks"
    - "Mandatory scoping (user_id + agent_id)"
    - "Parameterized queries (no SQL injection)"
    - "Surrogate key architecture (no PII in keys)"
    - "No raw SQL in public API"
    - "Typed lifecycle reports for audit"
  hardening_roadmap:
    v0_1:
      - "BEGIN IMMEDIATE for all write transactions"
      - "Input validation at API boundary"
      - "Tombstone table for cascade deletion"
      - "Content-hash integrity column"
      - "Provider output validation"
      - "WAL checkpoint management"
    v0_2:
      - "Quarantine API"
      - "SQLCipher feature flag"
      - "Audit trait"
      - "compact() method"
    v0_3:
      - "Formal security audit"
      - "Fuzz testing (cargo-fuzz)"
  compliance:
    gdpr: "purge() + VACUUM + crypto-shredding via per-user keys"
    ccpa: "query/knowledge/preferences for access; purge for deletion"
    soc2: "Simplified -- no cloud deps, no network, single file"
    hipaa: "Not designed for HIPAA; requires SQLCipher + audit logging"

operations:
  logging_strategy:
    model: "library-native (consumer owns subscriber, library emits spans)"
    crate: "tracing 0.1 (optional, feature-flagged)"
    target_prefix: "alaya::"
    pii_policy: "Never log content, queries, observations, embeddings, or entity names. Log only metadata: lengths, counts, IDs, types, timestamps."
    enforcement: ["skip in #[instrument]", "No Debug formatting of content types", "Integration test for PII leakage"]
    current_state: "No tracing dependency yet. Observability via typed reports only."
  tracing:
    feature_flag: "tracing"
    span_hierarchy:
      public_methods: ["open", "store_episode", "query", "consolidate", "perfume", "transform", "forget", "status", "purge"]
      pipeline_stages: ["bm25", "vector", "graph_activation", "rrf_fusion", "enrich", "rerank", "post_retrieval"]
      lifecycle_stages: ["fetch_episodes", "provider_extract", "store_node", "extract_impressions", "crystallize", "dedup_semantic", "prune_links", "decay_retrieval", "find_archivable"]
    event_count: 51
    degradation_events: ["degraded_no_embeddings", "degraded_no_links", "degraded_bm25_only", "degraded_empty_db", "provider_returned_empty"]
    consumer_integration: ["tracing-subscriber fmt", "tracing-subscriber json", "tracing-opentelemetry", "tokio-console", "custom Layer"]
  dashboards:
    model: "No built-in dashboards (library, not service)"
    consumer_options:
      - "Typed reports (ConsolidationReport, ForgettingReport, etc.) -- always available, no feature flag"
      - "tracing spans with timing subscribers -- query latency breakdown by pipeline stage"
      - "AlayaMetrics trait (v0.2) -- callback interface for Prometheus/StatsD/Datadog"
      - "diagnostics() method (v0.2) -- extended health snapshot including WAL, strengths, coverage"
    metrics_derivable_from_spans:
      - "query.duration, query.bm25.duration, query.vector.duration"
      - "store_episode.duration, consolidate.duration"
      - "query.result_count, query.retrieval_channels"
      - "consolidation.nodes_created, forgetting.nodes_archived"
    health_check_levels:
      - "Quick: status() -- 6 COUNT queries, call per request"
      - "Standard: diagnostics() -- ~20 queries, call per minute"
      - "Deep: health_check() -- PRAGMA integrity_check, call weekly"
  monitoring:
    model: "CI-pipeline-as-monitoring (library has no runtime to monitor)"
    quality_gates:
      - name: "test_coverage"
        tool: "cargo-llvm-cov"
        threshold: "80%"
        frequency: "every PR"
        action: "block merge"
      - name: "benchmark_regression"
        tool: "divan + baseline comparison"
        threshold: "20% regression"
        frequency: "every PR"
        action: "block merge"
      - name: "dependency_audit"
        tool: "cargo audit + cargo deny"
        threshold: "any vulnerability or banned crate"
        frequency: "every PR + weekly scheduled"
        action: "block merge / create issue"
      - name: "clippy_pedantic"
        tool: "cargo clippy -D warnings -D clippy::pedantic"
        threshold: "any warning"
        frequency: "every PR"
        action: "block merge"
      - name: "msrv_check"
        tool: "cargo +1.70.0 check"
        threshold: "compile failure"
        frequency: "every PR"
        action: "block merge"
      - name: "schema_compat"
        tool: "migration test against prior release DB"
        threshold: "open failure"
        frequency: "every release"
        action: "block release"
      - name: "network_dep_ban"
        tool: "cargo deny [bans]"
        banned: ["reqwest", "hyper", "openssl", "rustls"]
        frequency: "every PR"
        action: "block merge"
    proxy_metrics:
      - name: "MACC (Monthly Active Crate Consumers)"
        source: "GitHub dependents with recent commits"
        frequency: "monthly"
      - name: "crates.io downloads"
        source: "crates.io/crates/alaya"
        frequency: "weekly"
      - name: "issue velocity"
        source: "GitHub issues opened/closed"
        frequency: "weekly"
    compile_time_budget:
      clean_build: "< 60s"
      incremental_build: "< 10s"
      feature_flag_ceiling: "< 120s (any combination)"
    binary_size_budget:
      core_release_stripped: "< 5MB"
      with_embed_ort: "< 45MB (acceptable, feature-gated)"
  alerts:
    model: "GitHub-native (no PagerDuty, no Sentry -- library has no runtime)"
    channels:
      - name: "dependabot_security"
        trigger: "cargo audit finds vulnerability in dependency"
        response: "evaluate within 24 hours, update within 1 week"
      - name: "ci_failure_on_main"
        trigger: "CI pipeline fails on main branch"
        response: "fix within 24 hours"
      - name: "sev1_issue"
        trigger: "bug/data-corruption or bug/semver-violation label"
        response: "acknowledge within 4 hours, fix within 24 hours"
      - name: "sev2_issue"
        trigger: "bug/security label"
        response: "acknowledge within 24 hours, fix within 48 hours"
      - name: "downstream_breakage"
        trigger: "consumer reports build failure after cargo update"
        response: "reproduce + classify within 48 hours"
      - name: "docs_rs_failure"
        trigger: "docs.rs fails to build documentation"
        response: "fix within 1 week"
    escalation:
      sev1: "data corruption or semver violation -> 4h ack, 24h hotfix, yank"
      sev2: "security vulnerability -> 24h ack, 48h fix"
      sev3: "incorrect behavior or panic -> 48h ack, next release"
      sev4: "performance regression -> 1wk ack, next release"
    post_mortem:
      required_for: ["SEV-1", "SEV-2"]
      template: "what happened, why not caught, what gate added"
      location: "docs/post-mortems/"

